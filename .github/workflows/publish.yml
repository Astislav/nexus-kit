name: publish

on:
  push:
    tags: ["v*", "*-v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # PyPI trusted publishing (OIDC), no tokens needed
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Resolve package from tag  # v1.2.3 -> nexus-kit; postgres-v1.2.3 -> nexus-kit-postgres
        id: pkg
        run: |
          TAG="$GITHUB_REF_NAME"
          if [[ "$TAG" == *-v* ]]; then
            echo "name=nexus-kit-${TAG%%-v*}" >> "$GITHUB_OUTPUT"
          else
            echo "name=nexus-kit" >> "$GITHUB_OUTPUT"
          fi
      - run: uv sync --all-packages
      - run: uv run pytest -q
      - run: uv build --package ${{ steps.pkg.outputs.name }}
      - run: uv publish --trusted-publishing always

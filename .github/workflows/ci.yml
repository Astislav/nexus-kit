name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages
      - run: uv run ruff check .

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages --python ${{ matrix.python }}
      - run: uv run pytest -q

  frozen:
    # The flagship claim — "paths that survive PyInstaller" — proven on a real
    # frozen build USING THE SHIPPED TOOLING: scaffold an app, `nexus-kit
    # freeze` it, build with the generated app.spec, run the exe with .env
    # placed NEXT TO THE EXE (not the cwd), assert the config actually loaded.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages
      - name: Scaffold + freeze artifacts
        run: |
          uv run nexus-kit new frozen-probe
          cd frozen-probe
          uv run --project .. nexus-kit freeze
      - name: Build with the generated spec
        run: |
          uv run --with pyinstaller pyinstaller frozen-probe/app.spec --distpath frozen-dist --workpath frozen-build
      - name: Run the exe — .env beside the exe, cwd elsewhere
        run: |
          Set-Content frozen-dist/.env "APP_NAME=frozen-and-loaded`nTICK_SECONDS=0.1`nRUN_SECONDS=1"
          $out = & .\frozen-dist\frozen-probe.exe
          Write-Host ($out -join "`n")
          if (-not ($out -match "\[frozen-and-loaded\]")) { Write-Error "Root.external did not read .env from the exe dir"; exit 1 }
          if (-not ($out -match "tick #1")) { Write-Error "ticker did not tick"; exit 1 }
          if (-not ($out -match "stopped after")) { Write-Error "lifecycle did not stop cleanly"; exit 1 }
